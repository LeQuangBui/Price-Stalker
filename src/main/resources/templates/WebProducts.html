<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Web Products</title>
  <link rel="stylesheet" th:href="@{/css/web-products.css}" />
</head>
<body>

<header class="topbar">
  <h1>Products</h1>
  <p class="subtitle">
    Total:
    <strong th:text="${#lists.size(webProducts)}">0</strong>
    products
  </p>
</header>

<main class="container">

  <!-- Empty state -->
  <div class="empty" th:if="${#lists.isEmpty(webProducts)}">
    <h2>No products found</h2>
    <p>The database returned no products.</p>
  </div>

  <!-- Cards -->
  <section class="grid" th:if="${!#lists.isEmpty(webProducts)}">

    <article class="card" th:each="p : ${webProducts}">
      <div class="card-head">
        <h2 th:text="${p.name}">Product name</h2>
        <span class="badge" th:text="${p.websiteId}">website</span>
      </div>

      <div class="card-body">
        <div class="price">
          <span th:text="${p.currentPrice}">0</span>
          <span class="currency" th:text="${p.currency}">USD</span>
        </div>

        <dl class="meta">
          <div>
            <dt>WebProduct ID</dt>
            <dd th:text="${p.id}">id</dd>
          </div>
          <div>
            <dt>Product ID</dt>
            <dd th:text="${p.productId ?: '—'}">product</dd>
          </div>
          <div>
            <dt>Created</dt>
            <dd th:text="${#temporals.format(p.createdAt, 'yyyy-MM-dd HH:mm')}">date</dd>
          </div>
          <div>
            <dt>Updated</dt>
            <dd th:text="${#temporals.format(p.updatedAt, 'yyyy-MM-dd HH:mm')}">date</dd>
          </div>
        </dl>
      </div>

      <div class="actions">
        <a th:href="${p.url}" target="_blank" rel="noopener" class="btn">
          Open product
        </a>
      </div>
    </article>

  </section>

  <!-- Table view -->
  <section class="table-wrap" th:if="${!#lists.isEmpty(webProducts)}">
    <h2>Table view</h2>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Price</th>
          <th>Currency</th>
          <th>Website</th>
          <th>Product ID</th>
          <th>Updated</th>
          <th>Link</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="p : ${webProducts}">
          <td th:text="${p.name}">name</td>
          <td th:text="${p.currentPrice}">0</td>
          <td th:text="${p.currency}">USD</td>
          <td th:text="${p.websiteId}">site</td>
          <td th:text="${p.productId ?: '—'}">pid</td>
          <td th:text="${#temporals.format(p.updatedAt, 'yyyy-MM-dd HH:mm')}">date</td>
          <td>
            <a th:href="${p.url}" target="_blank">open</a>
          </td>
        </tr>
      </tbody>
    </table>
  </section>

</main>

</body>
</html>
