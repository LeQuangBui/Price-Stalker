<header id="header" th:fragment="header"
        xmlns:th="~{http://www.thymeleaf.org}"
        xmlns:sec="~{http://www.thymeleaf.org/extras/spring-security}">

  <!-- Logo -->
  <h1 id="logo">
    <a href="/">
      <img src="/images/logo.png" alt="PriceScout" />
    </a>
  </h1>

  <!-- Navigation -->
  <nav id="nav">
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/products">Products</a></li>

      <!-- Authenticated -->
      <li sec:authorize="isAuthenticated()">
        <a href="/bookmarks">Bookmarks</a>
      </li>
      <li sec:authorize="isAuthenticated()">
        <a href="/Auth/logout" class="button primary">Logout</a>
      </li>

      <!-- Anonymous -->
      <li sec:authorize="isAnonymous()">
        <a href="/Auth/signup" class="button">Sign Up</a>
      </li>
      <li sec:authorize="isAnonymous()">
        <a href="Auth/login" class="button primary">Sign In</a>
      </li>
    </ul>
  </nav>
</header>
