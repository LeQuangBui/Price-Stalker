<div th:fragment="content">
  <!-- Banner / Hero -->
  <section id="banner">
    <div class="content">
      <header>
        <h3>Find your cheapest deal to save your money</h3>
      </header>

      <!-- Search bar in middle -->
      <section id="search">
        <form id="heroSearchForm" th:action="@{/product/search}" method="get" class="search-form">
          <div class="import-wrapper">
            <button id="searchToggle" class="import-btn" type="button" aria-haspopup="true" aria-expanded="false">+</button>
            <ul id="searchMenu" class="import-menu" role="menu">
              <li role="menuitem" data-mode="url">Url</li>
              <li role="menuitem" data-mode="text">Keywords</li>
            </ul> 
          </div>

              <input id="keywordsInput" class="search-input" type="text" name="text" placeholder="Search products..." required autocomplete="off">
              <input id="urlInput" class="search-input" type="url" name="url" placeholder="Paste product link (https://...)" style="display:none;" autocomplete="off" disabled>
              <button id="button" class="button primary" type="submit" aria-label="Search">Search</button>
        </form>
      </section>
    </div>
    <a href="#one" class="goto-next scrolly">Next</a>
  </section>

  <!-- Products under search: user can scroll and click -->
  <section id="one" class="wrapper style1 special fade-up">
    <div class="container">
      <header class="major">
        <h2>Trending Products</h2>
        <p>Scroll and click a product, or use the search bar above.</p>
      </header>

      <div class="box alt">
        <div class="row gtr-uniform">
          <!-- Example cards; replace with th:each -->
          <section class="col-4 col-6-medium col-12-xsmall product-card" th:each="p : ${product}">
            <a th:href="@{/product/{id}(id=${p.id})}">
              <img class="icon solid alt major fa-tag" th:src="${p.productImages.get(0).url}" alt="product image" th:if="${p.productImages != null and !#lists.isEmpty(p.productImages)}">
              <h3 class="product-name" th:text="${p.name}">Product Name</h3>
            </a>
          </section>

          <!-- Fallback when no products -->
          <section class="col-12" th:if="${product == null || #lists.isEmpty(product)}">
            <div class="box">
              <p style="margin:0;">No products to show yet. Try searching!</p>
            </div>
          </section>
        </div>
      </div>
    </div>
  </section>

  <script>
  	const form = document.getElementById('heroSearchForm');
    const searchToggle = document.getElementById('searchToggle');
    const searchMenu = document.getElementById('searchMenu');
    
    const keywordsInput = document.getElementById('keywordsInput');
    const urlInput = document.getElementById('urlInput');

    function openMenu() {
 	  	searchMenu.style.display = 'block';
 	  	searchToggle.setAttribute('aria-expanded', 'true');
    }

    function closeMenu() {
    	searchMenu.style.display = 'none';
      	searchToggle.setAttribute('aria-expanded', 'false');
    }

    function setMode(mode) {
      if (mode === 'url') {
        // Link mode: GET /products?link=...
        form.setAttribute('action', '/product/search_url');

        keywordsInput.style.display = 'none';
        keywordsInput.disabled = true;
        keywordsInput.required = false;

        urlInput.style.display = 'block';
        urlInput.disabled = false;
        urlInput.required = true;
        urlInput.focus();
      } else {
        // Keyword mode: GET /products/search?keyword=...
        form.setAttribute('action', '/product/search');

        urlInput.style.display = 'none';
        urlInput.disabled = true;
        urlInput.required = false;

        keywordsInput.style.display = 'block';
        keywordsInput.disabled = false;
        keywordsInput.required = true;
        keywordsInput.focus();
      }
    }

    // + button toggles menu
    if (searchToggle && searchMenu) {
   		searchToggle.addEventListener('click', (e) => {
        	e.stopPropagation();
        	const isOpen = searchMenu.style.display === 'block';
        	isOpen ? closeMenu() : openMenu();
      	});

      // Click menu item -> switch mode
      searchMenu.addEventListener('click', (e) => {
	        const item = e.target.closest('li[data-mode]');
	        if (!item) return;
	
	        setMode(item.dataset.mode);
	        closeMenu();
      	});

      // Click outside closes menu
      document.addEventListener('click', closeMenu);
    }

    // Default mode
    setMode('text');
  </script>

</div>
