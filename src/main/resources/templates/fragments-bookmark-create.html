<div th:fragment="content">
  <section id="main" class="wrapper">
    <div class="inner">
      <header class="major">
        <h2>Create Bookmark (Future)</h2>
        <p>Post multiple links to create a new bookmark.</p>
      </header>

      <div class="box">
        <form method="post" action="/bookmark-create">
          <div class="row gtr-uniform">
            <div class="col-12">
              <input type="text" name="name" placeholder="Bookmark name" required />
            </div>
            <div class="col-12">
              <textarea name="links" rows="8" placeholder="Paste product links, one per line"></textarea>
            </div>
            <div class="col-12">
              <ul class="actions">
                <li><input type="submit" value="Create" class="primary" /></li>
                <li><a href="/bookmarks" class="button">Cancel</a></li>
              </ul>
            </div>
          </div>
        </form>
      </div>

    </div>
  </section>
</div>
