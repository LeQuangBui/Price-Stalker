<div th:fragment="content">
  <!-- Banner / Hero -->
  <section id="banner">
    <div class="content">
      <header>
        <h3>Find your cheapest deal to save your money</h3>
      </header>

      <!-- Search bar in middle -->
      <section id="search">
        <div class="search-container">
          <div class="import-wrapper">
            <button class="import-btn" aria-haspopup="true">+</button>
            <ul class="import-menu">
              <li>Import Link</li>
              <li>Upload Image</li>
              <li>Add Manually</li>
            </ul>
          </div>

          <input type="text" class="search-input" placeholder="Paste product link or search keywords" />

          <button id="search-submit-btn" class="button primary" style="padding:0 1rem; height:3rem; line-height:3rem;">
            Search
          </button>
        </div>
      </section>
    </div>
    <a href="#one" class="goto-next scrolly">Next</a>
  </section>

  <!-- Products under search: user can scroll and click -->
  <section id="one" class="wrapper style1 special fade-up">
    <div class="container">
      <header class="major">
        <h2>Trending Products</h2>
        <p>Scroll and click a product, or use the search bar above.</p>
      </header>

      <div class="box alt">
        <div class="row gtr-uniform">
          <!-- Example cards; replace with th:each -->
          <section class="col-4 col-6-medium col-12-xsmall" th:each="p : ${products}">
            <span class="icon solid alt major fa-tag"></span>
            <h3 th:text="${p.name}">Product Name</h3>
            <p>
              <strong th:text="${p.price}">$0.00</strong>
              <span style="opacity:.75;" th:text="${p.site}">Site</span>
            </p>
            <p>
              <a class="button" th:href="@{/product/{id}(id=${p.id})}">View</a>
            </p>
          </section>

          <!-- Fallback when no products -->
          <section class="col-12" th:if="${products == null || #lists.isEmpty(products)}">
            <div class="box">
              <p style="margin:0;">No products to show yet. Try searching!</p>
            </div>
          </section>
        </div>
      </div>
    </div>
  </section>

  <script>
    // Basic UI-only dropdown + search click (replace with real calls later)
    const importBtn = document.querySelector('.import-btn');
    const importMenu = document.querySelector('.import-menu');
    const searchBtn = document.querySelector('#search-submit-btn');
    const searchInput = document.querySelector('.search-input');

    if (importBtn && importMenu) {
      importBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        importMenu.style.display = importMenu.style.display === 'block' ? 'none' : 'block';
      });
      document.addEventListener('click', () => importMenu.style.display = 'none');
    }

    if (searchBtn && searchInput) {
      searchBtn.addEventListener('click', () => {
        const q = (searchInput.value || '').trim();
        if (!q) return;
        window.location.href = '/products?q=' + encodeURIComponent(q);
      });
      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') searchBtn.click();
      });
    }
  </script>
</div>
